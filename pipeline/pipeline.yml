name: food_security_pipeline
schedule: "0 6 1 2 *"
start_date: "2024-01-01"
catchup: false

default_connections:
    duckdb: "duckdb_default"

default:
    type: duckdb.sql

variables:
    start_year:
        type: integer
        default: 2010
    end_year:
        type: integer
        default: 2024
    climate_start_year:
        type: integer
        default: 2020
    climate_end_year:
        type: integer
        default: 2024
    analysis_start_year:
        type: integer
        default: 2018
    analysis_end_year:
        type: integer
        default: 2023
